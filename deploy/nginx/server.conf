# m365-native LAN HTTPS reverse proxy.
# Install as /etc/nginx/conf.d/server.conf on Ubuntu Nginx.
server {
    # This address is distinct from Docker's loopback-only 127.0.0.1:4141.
    listen 192.0.2.10:4141 ssl http2;
    server_name 192.0.2.10 m365-native.example.internal;

    location / {
        proxy_pass http://127.0.0.1:4141;
        proxy_http_version 1.1;

        # Preserve the real client address for rate limiting and audit trails.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streamed API response timeouts.
        proxy_connect_timeout 30s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
