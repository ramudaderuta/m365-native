user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    types_hash_bucket_size 128;
    server_names_hash_bucket_size 64;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # One internal CA-backed HTTPS site is hosted on this machine.
    ssl_certificate     /etc/nginx/conf.d/m365-native-server.crt;
    ssl_certificate_key /etc/nginx/conf.d/m365-native-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:M365NativeTLS:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    access_log /var/log/nginx/access.log;

    keepalive_timeout 120s;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;
    client_body_buffer_size 64k;
    # The service accepts media input but keeps a bounded request size.
    client_max_body_size 25m;

    # Required for streamed model responses; applies to the only proxy on host.
    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;

    gzip on;
    gzip_vary on;
    # Do not compress authenticated upstream responses.
    gzip_proxied off;
    gzip_min_length 1024;
    gzip_comp_level 3;
    gzip_buffers 32 4k;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss font/ttf font/opentype image/svg+xml;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        return 301 https://$host$request_uri;
    }

    # Keep standard HTTPS for the host's Nginx default page, not m365-native.
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        root /var/www/html;
        index index.nginx-debian.html index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
