name: Stable Release

on:
  push:
    tags:
      - 'stable-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      stable:
        description: 'Confirm this is an explicitly declared stable release'
        required: true
        type: boolean
        default: false
      tag:
        description: 'Release tag, for example stable-v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  CGO_ENABLED: 0
  BINARY_NAME: m365-native

jobs:
  package:
    name: Build stable binaries
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.stable == true)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          output="dist/${BINARY_NAME}-${GOOS}-${GOARCH}${suffix}"
          go build -trimpath -ldflags="-s -w" -o "${output}" ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish stable Release
    needs: package
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.stable == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BINARY_NAME }}-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${EVENT_TAG}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then tag="${INPUT_TAG}"; fi
          case "${tag}" in
            stable-v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must use stable-vX.Y.Z, got: ${tag}"; exit 1 ;;
          esac
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Stable ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
